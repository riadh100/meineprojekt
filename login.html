<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Empire Pro - Login</title>

<link rel="stylesheet" href="style.css">

</head>
<body>

<div class="login-page">

    <div class="login-card">

        <div class="login-logo">

            <h1>👑 AI Empire Pro</h1>

            <p>Riadh Edition</p>

        </div>

        <div class="login-status">

            <span class="online-dot"></span>

            System Online

        </div>

        <form id="loginForm">

            <div class="input-group">

                <label>Benutzername</label>

                <input
                    type="text"
                    id="username"
                    placeholder="Benutzername eingeben"
                    required>

            </div>

            <div class="input-group">

                <label>Passwort</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Passwort eingeben"
                    required>

            </div>

            <div class="remember-box">

                <input
                    type="checkbox"
                    id="rememberMe">

                <label for="rememberMe">
                    Benutzer speichern
                </label>

            </div>

            <button
                type="submit"
                class="btn login-btn">

                Login

            </button>

        </form>

        <div class="login-info">

            <p>
                AI Empire Pro Dashboard V4
            </p>

            <p>
                Premium Control Center
            </p>

        </div>

    </div>

</div>

<script>

const loginForm =
document.getElementById(
    "loginForm"
);

const savedUser =
localStorage.getItem(
    "empire_user"
);

if(savedUser){

    document.getElementById(
        "username"
    ).value = savedUser;

    document.getElementById(
        "rememberMe"
    ).checked = true;

}

loginForm.addEventListener(
    "submit",
    function(event){

        event.preventDefault();

        const username =
        document.getElementById(
            "username"
        ).value;

        const password =
        document.getElementById(
            "password"
        ).value;

        if(
            username.trim() === "" ||
            password.trim() === ""
        ){

            alert(
                "Bitte alle Felder ausfüllen."
            );

            return;

        }

        if(
            document.getElementById(
                "rememberMe"
            ).checked
        ){

            localStorage.setItem(
                "empire_user",
                username
            );

        }

        window.location.href =
        "index.html";

    }
);

</script>

</body>
</html>
