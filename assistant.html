<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Yasin AI Pro | AI Empire Pro</title>

<link rel="stylesheet" href="style.css">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0b0b0b;
    color:white;
    display:flex;
    flex-direction:column;
    height:100vh;
}

/* HEADER */

.header{
    background:#111;
    border-bottom:2px solid gold;
    padding:15px 25px;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.logo{
    color:gold;
    font-size:24px;
    font-weight:bold;
}

.status{
    color:#00ff66;
    font-weight:bold;
}

/* NAVIGATION */

.nav{
    background:#161616;
    padding:10px;
    display:flex;
    gap:10px;
    justify-content:center;
    border-bottom:1px solid #333;
}

.nav a{
    text-decoration:none;
    color:white;
    border:1px solid gold;
    padding:10px 15px;
    border-radius:8px;
    transition:0.3s;
}

.nav a:hover{
    background:gold;
    color:black;
}

/* CHAT */

.chat-container{
    flex:1;
    overflow-y:auto;
    padding:20px;
}

.message{
    max-width:75%;
    padding:15px;
    margin-bottom:15px;
    border-radius:15px;
    line-height:1.5;
    word-wrap:break-word;
}

.user{
    background:gold;
    color:black;
    margin-left:auto;
}

.ai{
    background:#1b1b1b;
    border:1px solid gold;
    color:white;
}

/* INPUT */

.input-area{
    background:#111;
    border-top:2px solid gold;
    padding:15px;
    display:flex;
    gap:10px;
}

.input-area input{
    flex:1;
    padding:15px;
    background:#161616;
    color:white;
    border:1px solid gold;
    border-radius:10px;
    outline:none;
}

.send-btn{
    background:gold;
    color:black;
    border:none;
    padding:15px 25px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.clear-btn{
    background:#c62828;
    color:white;
    border:none;
    padding:15px 20px;
    border-radius:10px;
    cursor:pointer;
}

/* MOBILE */

@media(max-width:700px){

.message{
    max-width:95%;
}

.nav{
    flex-wrap:wrap;
}

}

</style>
</head>
<body>

<div class="header">

<div class="logo">
🤖 Yasin AI Pro
</div>

<div class="status">
● ONLINE
</div>

</div>

<div class="nav">

<a href="index.html">Dashboard</a>

<a href="trading.html">Trading</a>

<a href="telegram.html">Telegram</a>

<a href="video.html">Video</a>

<a href="game.html">Game</a>

<a href="tools.html">Tools</a>

</div>

<div class="chat-container" id="chatContainer">

<div class="message ai">
Willkommen bei Yasin AI Pro 👑<br><br>
Wie kann ich dir heute helfen?
</div>

</div>

<div class="input-area">

<input
type="text"
id="userInput"
placeholder="Nachricht eingeben..."
>

<button
class="send-btn"
onclick="sendMessage()">
Senden
</button>

<button
class="clear-btn"
onclick="clearChat()">
Löschen
</button>

</div>

<script>

const chatContainer =
document.getElementById("chatContainer");

function addMessage(text,type){

    const div =
    document.createElement("div");

    div.classList.add("message");
    div.classList.add(type);

    div.innerHTML = text;

    chatContainer.appendChild(div);

    chatContainer.scrollTop =
    chatContainer.scrollHeight;

}

function generateResponse(message){

    const msg =
    message.toLowerCase();

    if(msg.includes("hallo"))
        return "Hallo Riadh 👋";

    if(msg.includes("dashboard"))
        return "Dashboard ist aktiv und läuft stabil.";

    if(msg.includes("trading"))
        return "Trading Center ist online.";

    if(msg.includes("telegram"))
        return "Telegram Modul ist bereit.";

    if(msg.includes("video"))
        return "Video Creator steht bereit.";

    if(msg.includes("game"))
        return "Game Studio ist online.";

    if(msg.includes("tools"))
        return "Tools Center wurde geladen.";

    if(msg.includes("zeit"))
        return new Date().toLocaleString("de-DE");

    return "Yasin AI verarbeitet deine Anfrage: " + message;
}

function sendMessage(){

    const input =
    document.getElementById("userInput");

    const text =
    input.value.trim();

    if(text==="") return;

    addMessage(text,"user");

    const answer =
    generateResponse(text);

    setTimeout(()=>{

        addMessage(answer,"ai");

        saveChat();

    },500);

    input.value="";

    saveChat();

}

function saveChat(){

    localStorage.setItem(
        "yasin_ai_chat",
        chatContainer.innerHTML
    );

}

function loadChat(){

    const chat =
    localStorage.getItem(
        "yasin_ai_chat"
    );

    if(chat){

        chatContainer.innerHTML = chat;

    }

}

function clearChat(){

    if(confirm("Chat löschen?")){

        localStorage.removeItem(
            "yasin_ai_chat"
        );

        location.reload();

    }

}

document
.getElementById("userInput")
.addEventListener("keypress",function(e){

    if(e.key==="Enter"){

        sendMessage();

    }

});

loadChat();

</script>

</body>
</html>
