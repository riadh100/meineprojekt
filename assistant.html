<div class="app-layout">

    <!-- SIDEBAR -->

        </div>

        <nav>
            <ul>
                <li><a href="dashboard.html">🏠 Dashboard</a></li>
                <li class="active"><a href="assistant.html">🤖 Assistant</a></li>
                <li><a href="trading.html">📈 Trading</a></li>
                <li><a href="telegram.html">💬 Telegram</a></li>

    <!-- MAIN -->
    <main class="main-content">

        <!-- TOPBAR -->
        <header class="topbar">

<script>

/* =======================================================
   AI Assistant Chat Engine (V7)
======================================================= */

function sendMessage(){

    const input=document.getElementById("userInput");

    const chat=document.getElementById("chatBox");

    if(!input || !chat) return;

    const text=input.value.trim();

    if(text==="") return;

    /* USER MESSAGE */
    const userMsg=document.createElement("div");

    userMsg.className="message user";

    userMsg.innerHTML="<span>Du:</span> "+text;

    chat.appendChild(userMsg);

    input.value="";

    chat.scrollTop=chat.scrollHeight;

    /* BOT TYPING */
    const typing=document.createElement("div");

    typing.className="message bot";

    typing.innerHTML="<span>AI:</span> tippt...";

    chat.appendChild(typing);

    chat.scrollTop=chat.scrollHeight;

    /* SIMULATED RESPONSE */
    setTimeout(()=>{

        typing.remove();

        const reply=document.createElement("div");

        reply.className="message bot";

        reply.innerHTML="<span>AI:</span> "+generateResponse(text);

        chat.appendChild(reply);

        chat.scrollTop=chat.scrollHeight;

    },1000);

}

/* =======================================================
   Fake AI Engine
======================================================= */

function generateResponse(input){

    input=input.toLowerCase();

    if(input.includes("hallo") || input.includes("hi")){

        return "Hallo 👋 Ich bin dein AI Assistant. Wie kann ich helfen?";

    }

    if(input.includes("trading")){

        return "Trading-Modul ist aktiv 📈 Soll ich dir aktuelle Signale anzeigen?";

    }

    if(input.includes("video")){

        return "Video Studio bereit 🎬 Ich kann dir ein Video erstellen lassen.";

    }

    if(input.includes("hilfe")){

        return "Ich kann dich bei Trading, KI, Telegram und Automatisierung unterstützen.";

    }

    return "Ich habe deine Anfrage erhalten. Analyse läuft... 🤖";

}

/* =======================================================
   Enter Taste Support
======================================================= */

document.addEventListener("DOMContentLoaded",()=>{

    const input=document.getElementById("userInput");

    if(input){

        input.addEventListener("keypress",(e)=>{

            if(e.key==="Enter"){

                sendMessage();

            }

        });

    }

});

</script>
<script>

/* =======================================================
   AI Assistant PRO FEATURES (V7)
======================================================= */

/* ================================
   CHAT HISTORY (LOCALSTORAGE)
================================ */

function saveChat(){

    const chat=document.getElementById("chatBox");

    if(!chat) return;

    localStorage.setItem("ai_chat_v7", chat.innerHTML);

}

function loadChat(){

    const chat=document.getElementById("chatBox");

    if(!chat) return;

    const saved=localStorage.getItem("ai_chat_v7");

    if(saved){

        chat.innerHTML=saved;

    }

}

/* ================================
   AUTO SAVE CHAT
================================ */

setInterval(()=>{

    saveChat();

},5000);

/* ================================
   EXPORT CHAT
================================ */

function exportChat(){

    const chat=document.getElementById("chatBox");

    if(!chat) return;

    const text=chat.innerText;

    const blob=new Blob([text],{type:"text/plain"});

    const url=URL.createObjectURL(blob);

    const a=document.createElement("a");

    a.href=url;

    a.download="ai-chat-export.txt";

    a.click();

    URL.revokeObjectURL(url);

}

/* ================================
   PROMPT SHORTCUTS
================================ */

function insertPrompt(text){

    const input=document.getElementById("userInput");

    if(!input) return;

    input.value=text;

    input.focus();

}

/* ================================
   SHORTCUT BUTTONS (optional UI)
================================ */

document.addEventListener("DOMContentLoaded",()=>{

    loadChat();

    const tools=document.querySelector(".assistant-tools");

    if(tools){

        const box=document.createElement("div");

        box.style.marginTop="15px";

        box.innerHTML=`

            <h3>Shortcuts</h3>

            <button onclick="insertPrompt('Erstelle eine Trading Analyse')">📈 Trading Analyse</button>

            <button onclick="insertPrompt('Gib mir 5 Business Ideen')">💡 Ideen</button>

            <button onclick="insertPrompt('Erstelle ein Video Script')">🎬 Video Script</button>

            <button onclick="exportChat()">⬇ Chat Export</button>

        `;

        tools.appendChild(box);

    }

});

/* ================================
   CLEAR CHAT
================================ */

function clearChat(){

    const chat=document.getElementById("chatBox");

    if(!chat) return;

    chat.innerHTML=`

        <div class="message bot">

            <span>AI:</span>

            Chat wurde zurückgesetzt.

        </div>

    `;

    localStorage.removeItem("ai_chat_v7");

}

/* ================================
   ENHANCED RESPONSE HOOK (FUTURE AI API)
================================ */

function setAIResponseHandler(callback){

    window.aiResponseHandler=callback;

}

/* ================================
   OVERRIDE generateResponse (optional upgrade hook)
================================ */

function generateResponse(input){

    if(window.aiResponseHandler){

        return window.aiResponseHandler(input);

    }

    input=input.toLowerCase();

    if(input.includes("hallo")) return "Hallo 👋";

    if(input.includes("trading")) return "📈 Trading Analyse bereit.";

    if(input.includes("video")) return "🎬 Video Modul aktiv.";

    if(input.includes("hilfe")) return "Ich unterstütze dich im gesamten System.";

    return "Analyse abgeschlossen 🤖";
}

/* ================================
   INIT
================================ */

document.addEventListener("DOMContentLoaded",()=>{

    loadChat();

});

</script>
