<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Empire Pro V9 – Marktanalyse</title>

<link rel="stylesheet" href="style.css">

<style>

:root{

--bg:#070b18;
--card:rgba(255,255,255,.08);
--border:rgba(255,255,255,.12);

--primary:#7c5cff;
--cyan:#00d4ff;
--green:#27e0a3;
--yellow:#ffc857;
--red:#ff5c7a;

--text:#ffffff;
--muted:#aab5d2;

}

*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:Inter,Arial,sans-serif;

}

body{

background:
radial-gradient(circle at top left,#7c5cff33,transparent 35%),
radial-gradient(circle at top right,#00d4ff22,transparent 35%),
linear-gradient(135deg,#050814,#0a1124);

color:white;

min-height:100vh;

padding:25px;

}

.container{

max-width:1400px;

margin:auto;

}

header{

display:flex;

justify-content:space-between;

align-items:center;

margin-bottom:30px;

}

.back{

padding:12px 20px;

border-radius:40px;

background:linear-gradient(135deg,var(--primary),var(--cyan));

color:white;

text-decoration:none;

font-weight:bold;

}

.hero{

padding:35px;

border-radius:28px;

background:var(--card);

border:1px solid var(--border);

backdrop-filter:blur(20px);

margin-bottom:25px;

}

.hero h1{

font-size:2.5rem;

margin-bottom:10px;

}

.hero p{

color:var(--muted);

line-height:1.8;

}

.grid{

display:grid;

grid-template-columns:2fr 1fr;

gap:20px;

margin-bottom:20px;

}

.card{

background:var(--card);

border:1px solid var(--border);

border-radius:24px;

padding:24px;

backdrop-filter:blur(18px);

}

.card h2{

margin-bottom:20px;

}

.market-row{

display:flex;

justify-content:space-between;

align-items:center;

padding:16px 0;

border-bottom:1px solid rgba(255,255,255,.08);

}

.market-row:last-child{

border:none;

}

.coin{

font-weight:bold;

font-size:18px;

}

.change-up{

color:var(--green);

font-weight:bold;

}

.change-down{

color:var(--red);

font-weight:bold;

}

textarea{

width:100%;

height:180px;

background:#111c39;

border:1px solid var(--border);

border-radius:16px;

padding:15px;

color:white;

resize:vertical;

margin-top:15px;

margin-bottom:15px;

}

button{

border:none;

padding:14px 22px;

border-radius:40px;

cursor:pointer;

background:linear-gradient(135deg,var(--primary),var(--cyan));

color:white;

font-weight:bold;

font-size:15px;

}

.result{

margin-top:20px;

padding:18px;

border-radius:18px;

background:#111c39;

color:var(--muted);

line-height:1.8;

}

.stats{

display:grid;

grid-template-columns:1fr;

gap:15px;

}

.stat{

background:#111c39;

border-radius:18px;

padding:18px;

}

.stat h3{

font-size:15px;

margin-bottom:8px;

color:var(--muted);

}

.stat strong{

font-size:30px;

}
