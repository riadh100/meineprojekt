name: AI Empire Pro CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main

jobs:

  build:

    runs-on: ubuntu-latest

    strategy:

      matrix:

        node-version: [20.x]

    steps:

      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Node.js installieren
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Tests ausführen
        run: npm test

      - name: Syntax prüfen
        run: npm run lint
        continue-on-error: true

      - name: Build erfolgreich
        run: echo "AI Empire Pro V8 erfolgreich geprüft."
